<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB - My Profile</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/logo.svg" alt="HBNB Logo" class="logo">
        </a>
        <nav>
            <a href="index.html">Places</a>
            <a id="nav-new-place" href="create_place.html" style="display:none">New Place</a>
            <a id="nav-profile" href="profile.html" class="active" style="display:none">Profile</a>
            <a id="login-link" href="login.html" class="login-button" style="display:none">Login</a>
            <a id="logout-link" href="#" class="login-button" style="display:none">Logout</a>
        </nav>
    </header>

    <main>
        <section class="profile-section">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-avatar">?</div>
                <div>
                    <h1 id="profile-name">Loading...</h1>
                    <p id="profile-email" class="text-light"></p>
                    <p id="profile-since" class="text-light"></p>
                </div>
            </div>

            <div class="profile-card">
                <h2>Edit Profile</h2>
                <form id="profile-form" novalidate>
                    <div class="form-group">
                        <label for="first_name">First name</label>
                        <input type="text" id="first_name" name="first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last name</label>
                        <input type="text" id="last_name" name="last_name" required>
                    </div>
                    <p id="profile-error" class="error-message" role="alert" hidden></p>
                    <p id="profile-success" class="success-message" role="status" hidden>Profile updated!</p>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </form>
            </div>

            <div class="profile-card">
                <h2>My Places</h2>
                <div id="my-places-list">
                    <p class="no-reviews">Loading...</p>
                </div>
                <a href="create_place.html" class="btn-primary" style="display:inline-block;text-align:center;margin-top:16px;text-decoration:none">+ Add a Place</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>
</body>
</html>
