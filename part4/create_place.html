<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB - New Place</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/logo.png" alt="HBNB Logo" class="logo">
        </a>
        <nav>
            <a href="index.html">Places</a>
            <a id="nav-new-place" href="create_place.html" class="active" style="display:none">New Place</a>
            <a id="nav-profile" href="profile.html" style="display:none">Profile</a>
            <a id="login-link" href="login.html" class="login-button" style="display:none">Login</a>
            <a id="logout-link" href="#" class="login-button" style="display:none">Logout</a>
        </nav>
    </header>

    <main>
        <a href="index.html" class="back-link">&#8592; Back to places</a>

        <section class="add-review">
            <h2>Create a New Place</h2>
            <p class="subtitle">Share your space with the world</p>

            <form id="create-place-form" novalidate>
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Cozy apartment in Paris" required maxlength="100">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Describe your place..." maxlength="1024"></textarea>
                </div>

                <div class="form-group">
                    <label for="price">Price per night ($)</label>
                    <input type="number" id="price" name="price" placeholder="50" min="1" step="1" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="latitude">Latitude</label>
                        <input type="number" id="latitude" name="latitude" placeholder="48.8566" min="-90" max="90" step="any" required>
                    </div>
                    <div class="form-group">
                        <label for="longitude">Longitude</label>
                        <input type="number" id="longitude" name="longitude" placeholder="2.3522" min="-180" max="180" step="any" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Amenities</label>
                    <div id="amenities-list" class="amenities-checkboxes">
                        <p class="text-light">Loading amenities...</p>
                    </div>
                </div>

                <p id="create-place-error" class="error-message" role="alert" hidden></p>
                <p id="create-place-success" class="success-message" role="status" hidden>
                    Place created! <a href="index.html">View all places</a>
                </p>

                <button type="submit" class="btn-primary">Create Place</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>
</body>
</html>
