<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB - Find Your Place</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/logo.png" alt="HBNB Logo" class="logo">
        </a>
        <nav>
            <a href="index.html" class="active">Places</a>
            <a id="nav-profile" href="profile.html" style="display:none">Profile</a>
            <a id="login-link" href="login.html" class="login-button" style="display:none">Login</a>
            <a id="logout-link" href="#" class="login-button" style="display:none">Logout</a>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Explore Places</h1>
        <p class="page-subtitle">Discover unique stays around the world</p>

        <section class="filter-bar">
            <label for="price-filter">Max price per night:</label>
            <select id="price-filter" name="price-filter">
                <option value="all">All</option>
                <option value="10">$10</option>
                <option value="50">$50</option>
                <option value="100">$100</option>
            </select>
        </section>

        <section id="places-list" class="places-grid" aria-label="Available places">
            <!-- Populated dynamically by scripts.js -->
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>
</body>
</html>
