<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB - Place Details</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/logo.svg" alt="HBNB Logo" class="logo">
        </a>
        <nav>
            <a href="index.html">Places</a>
            <a id="login-link" href="login.html" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <a href="index.html" class="back-link">&#8592; Back to places</a>

        <!-- Place details injected here by scripts.js -->
        <div id="place-details"></div>

        <!-- Reviews injected here by scripts.js -->
        <section class="reviews-section" id="reviews-section" hidden>
            <div class="reviews-header">
                <h2 class="section-title">Guest Reviews</h2>
            </div>
            <div id="reviews-list" class="reviews-grid"></div>
        </section>

        <!-- Add review — shown only when authenticated -->
        <section id="add-review" class="add-review" hidden>
            <h2>Share your experience</h2>
            <p class="subtitle">Tell other guests what you thought!</p>

            <form id="review-form" action="#" method="post" class="form" novalidate>
                <div class="form-group">
                    <label>Your rating</label>
                    <div class="rating-group" role="radiogroup" aria-label="Rating">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        <label for="star5" aria-label="5 stars">&#9733;</label>
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4" aria-label="4 stars">&#9733;</label>
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3" aria-label="3 stars">&#9733;</label>
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2" aria-label="2 stars">&#9733;</label>
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1" aria-label="1 star">&#9733;</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="review-text">Your review</label>
                    <textarea
                        id="review-text"
                        name="review_text"
                        placeholder="Describe your stay..."
                        required
                        minlength="10"
                        maxlength="1000"
                    ></textarea>
                </div>

                <p id="review-error" class="error-message" role="alert" hidden></p>
                <button type="submit" class="btn-primary">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>
</body>
</html>
