<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB - Sign Up</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/logo.svg" alt="HBNB Logo" class="logo">
        </a>
        <nav>
            <a href="index.html">Places</a>
            <a href="login.html" class="login-button" id="login-link">Login</a>
            <a id="logout-link" href="#" class="login-button" style="display:none">Logout</a>
        </nav>
    </header>

    <main class="auth-wrapper">
        <section class="auth-card">
            <h1>Create an account</h1>
            <p>Join HBNB and start exploring</p>

            <form id="signup-form" action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="first_name">First name</label>
                    <input
                        type="text"
                        id="first_name"
                        name="first_name"
                        placeholder="John"
                        required
                        autocomplete="given-name"
                    >
                </div>

                <div class="form-group">
                    <label for="last_name">Last name</label>
                    <input
                        type="text"
                        id="last_name"
                        name="last_name"
                        placeholder="Doe"
                        required
                        autocomplete="family-name"
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Choose a password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <p id="signup-error" class="error-message" role="alert" hidden></p>
                <p id="signup-success" class="success-message" role="status" hidden>
                    Account created! <a href="login.html">Sign in now</a>
                </p>

                <button type="submit" class="btn-primary login-button">Sign Up</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>
</body>
</html>
