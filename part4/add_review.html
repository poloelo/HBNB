<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB - Add a Review</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/logo.svg" alt="HBNB Logo" class="logo">
        </a>
        <nav>
            <a href="index.html">Places</a>
            <a href="login.html" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <a href="place.html" class="back-link">&#8592; Back to place</a>

        <section class="add-review">
            <h2>Share your experience</h2>
            <p class="subtitle">
                You stayed at <strong>Cozy Downtown Apartment</strong> &#8212; tell other guests what you thought!
            </p>

            <form action="#" method="post" class="form" novalidate>
                <div class="form-group">
                    <label for="reviewer-name">Your name</label>
                    <input
                        type="text"
                        id="reviewer-name"
                        name="reviewer_name"
                        placeholder="Jane Doe"
                        required
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label>Your rating</label>
                    <div class="rating-group" role="radiogroup" aria-label="Rating">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        <label for="star5" aria-label="5 stars">&#9733;</label>
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4" aria-label="4 stars">&#9733;</label>
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3" aria-label="3 stars">&#9733;</label>
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2" aria-label="2 stars">&#9733;</label>
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1" aria-label="1 star">&#9733;</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="review-text">Your review</label>
                    <textarea
                        id="review-text"
                        name="review_text"
                        placeholder="Describe your stay: what you loved, what could be improved..."
                        required
                        minlength="10"
                        maxlength="1000"
                    ></textarea>
                </div>

                <button type="submit" class="btn-primary">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>
</body>
</html>
