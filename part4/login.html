<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB - Login</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html">
            <img src="images/logo.png" alt="HBNB Logo" class="logo">
        </a>
        <nav>
            <a href="index.html">Places</a>
            <a id="nav-profile" href="profile.html" style="display:none">Profile</a>
            <a id="login-link" href="login.html" class="login-button" style="display:none">Login</a>
            <a id="logout-link" href="#" class="login-button" style="display:none">Logout</a>
        </nav>
    </header>

    <main class="auth-wrapper">
        <section class="auth-card">
            <h1>Welcome back</h1>
            <p>Sign in to your HBNB account</p>

            <form id="login-form" action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <p id="login-error" class="error-message" role="alert" hidden></p>

                <button type="submit" class="btn-primary login-button">Sign In</button>
            </form>

            <p class="auth-footer">
                Don&#39;t have an account? <a href="signup.html">Sign up</a>
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBNB. All rights reserved.</p>
    </footer>
</body>
</html>
