<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="logo.png" alt="HBnB Logo" class="logo" />
      <nav>
        <a href="index.html">Accueil</a>
        <a href="profile.html" id="profile-link" style="display:none;">Mon Profil</a>
        <a href="create_place.html" id="add-place-link" style="display:none;" class="nav-cta">+ Créer un lieu</a>
        <a href="#" id="logout-link" style="display:none;">Déconnexion</a>
        <a href="login.html" id="login-link" class="login-button">Login</a>
      </nav>
    </header>

    <main>
      <a href="place.html" class="back-link">&#8592; Retour au lieu</a>

      <section class="add-review">
        <h2>Laisser un avis</h2>

        <form class="form" id="review-form" action="#" method="post" novalidate>

          <div class="form-group">
            <label>Votre note</label>
            <div class="star-rating" id="rating">
              <input type="radio" id="star5" name="rating" value="5" />
              <label for="star5" title="5 étoiles">&#9733;</label>
              <input type="radio" id="star4" name="rating" value="4" />
              <label for="star4" title="4 étoiles">&#9733;</label>
              <input type="radio" id="star3" name="rating" value="3" />
              <label for="star3" title="3 étoiles">&#9733;</label>
              <input type="radio" id="star2" name="rating" value="2" />
              <label for="star2" title="2 étoiles">&#9733;</label>
              <input type="radio" id="star1" name="rating" value="1" />
              <label for="star1" title="1 étoile">&#9733;</label>
            </div>
          </div>

          <div class="form-group">
            <label for="comment">Votre avis</label>
            <textarea
              id="comment"
              name="comment"
              rows="5"
              placeholder="Partagez votre expérience avec ce lieu..."
              required
            ></textarea>
          </div>

          <button type="submit" class="btn-primary">Publier l'avis</button>

        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="nav.js"></script>
    <script src="add_review.js"></script>
  </body>
</html>
