<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Créer un lieu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="logo.png" alt="HBnB Logo" class="logo" />
      <nav>
        <a href="index.html">Accueil</a>
        <a href="profile.html" id="profile-link" style="display:none;">Mon Profil</a>
        <a href="create_place.html" id="add-place-link" style="display:none;" class="nav-cta">+ Créer un lieu</a>
        <a href="#" id="logout-link" style="display:none;">Déconnexion</a>
        <a href="login.html" id="login-link" class="login-button">Login</a>
      </nav>
    </header>

    <main>
      <a href="index.html" class="back-link">&#8592; Retour aux lieux</a>

      <div class="form-card">
        <h1>Créer un nouveau lieu</h1>
        <p class="subtitle">Remplissez les informations ci-dessous pour publier votre lieu.</p>

        <p id="form-error" class="form-error" style="display:none;"></p>

        <form id="create-place-form" action="#" method="post" novalidate>

          <!-- Titre -->
          <div class="form-group">
            <label for="title">Titre <span class="required">*</span></label>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="Ex: Loft moderne en centre-ville"
              maxlength="100"
              required
            />
          </div>

          <!-- Description -->
          <div class="form-group">
            <label for="description">Description</label>
            <textarea
              id="description"
              name="description"
              rows="4"
              placeholder="Décrivez votre lieu : ambiance, points forts, accès..."
            ></textarea>
          </div>

          <!-- Prix / Coordonnées (2 colonnes) -->
          <div class="form-row">
            <div class="form-group">
              <label for="price">Prix par nuit ($) <span class="required">*</span></label>
              <input
                type="number"
                id="price"
                name="price"
                placeholder="85"
                min="1"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <!-- champ vide pour aligner la grille -->
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="latitude">Latitude <span class="required">*</span></label>
              <input
                type="number"
                id="latitude"
                name="latitude"
                placeholder="48.8566"
                min="-90"
                max="90"
                step="any"
                required
              />
              <span class="field-hint">Entre -90 et 90</span>
            </div>

            <div class="form-group">
              <label for="longitude">Longitude <span class="required">*</span></label>
              <input
                type="number"
                id="longitude"
                name="longitude"
                placeholder="2.3522"
                min="-180"
                max="180"
                step="any"
                required
              />
              <span class="field-hint">Entre -180 et 180</span>
            </div>
          </div>

          <!-- Équipements -->
          <div class="form-group">
            <label>Équipements disponibles</label>
            <div class="amenities-grid" id="amenities-container">
              <p class="field-hint">Chargement des équipements…</p>
            </div>
          </div>

          <button type="submit" class="btn-primary">Publier mon lieu</button>

        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="nav.js"></script>
    <script src="create_place.js"></script>
  </body>
</html>
